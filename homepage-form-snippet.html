<!-- NATIVE HOMEPAGE LEAD FORM -->
<form id="homepage-lead-form" style="display:flex;flex-direction:column;gap:16px;">
  
  <!-- First Name -->
  <div style="display:flex;flex-direction:column;gap:6px;">
    <label style="font-size:14px;font-weight:600;color:#452068;" data-en="First Name" data-es="Nombre">First Name</label>
    <input type="text" id="form-first-name" required 
           style="padding:12px;border:2px solid #e5e5e5;border-radius:8px;font-size:15px;font-family:Arial,sans-serif;transition:border-color 0.2s;"
           onfocus="this.style.borderColor='#452068'" 
           onblur="this.style.borderColor='#e5e5e5'">
  </div>

  <!-- Last Name -->
  <div style="display:flex;flex-direction:column;gap:6px;">
    <label style="font-size:14px;font-weight:600;color:#452068;" data-en="Last Name" data-es="Apellido">Last Name</label>
    <input type="text" id="form-last-name" required 
           style="padding:12px;border:2px solid #e5e5e5;border-radius:8px;font-size:15px;font-family:Arial,sans-serif;transition:border-color 0.2s;"
           onfocus="this.style.borderColor='#452068'" 
           onblur="this.style.borderColor='#e5e5e5'">
  </div>

  <!-- Phone -->
  <div style="display:flex;flex-direction:column;gap:6px;">
    <label style="font-size:14px;font-weight:600;color:#452068;" data-en="Phone" data-es="Teléfono">Phone</label>
    <input type="tel" id="form-phone" required 
           style="padding:12px;border:2px solid #e5e5e5;border-radius:8px;font-size:15px;font-family:Arial,sans-serif;transition:border-color 0.2s;"
           onfocus="this.style.borderColor='#452068'" 
           onblur="this.style.borderColor='#e5e5e5'"
           placeholder="(305) 555-0100">
  </div>

  <!-- Email -->
  <div style="display:flex;flex-direction:column;gap:6px;">
    <label style="font-size:14px;font-weight:600;color:#452068;" data-en="Email" data-es="Correo Electrónico">Email</label>
    <input type="email" id="form-email" required 
           style="padding:12px;border:2px solid #e5e5e5;border-radius:8px;font-size:15px;font-family:Arial,sans-serif;transition:border-color 0.2s;"
           onfocus="this.style.borderColor='#452068'" 
           onblur="this.style.borderColor='#e5e5e5'"
           placeholder="tu@ejemplo.com">
  </div>

  <!-- Coverage Type -->
  <div style="display:flex;flex-direction:column;gap:6px;">
    <label style="font-size:14px;font-weight:600;color:#452068;" data-en="What are you looking for?" data-es="¿Qué estás buscando?">What are you looking for?</label>
    <select id="form-coverage-type" required 
            style="padding:12px;border:2px solid #e5e5e5;border-radius:8px;font-size:15px;font-family:Arial,sans-serif;background:white;transition:border-color 0.2s;"
            onfocus="this.style.borderColor='#452068'" 
            onblur="this.style.borderColor='#e5e5e5'">
      <option value="" data-en="Select one..." data-es="Selecciona una opción...">Select one...</option>
      <option value="Medicare — Advantage or Supplement" data-en="Medicare — Advantage or Supplement" data-es="Medicare — Advantage o Suplementario">Medicare — Advantage or Supplement</option>
      <option value="ACA Marketplace (Obamacare)" data-en="ACA Marketplace (Obamacare)" data-es="ACA Marketplace (Obamacare)">ACA Marketplace (Obamacare)</option>
      <option value="Private Health Insurance" data-en="Private Health Insurance" data-es="Seguro Médico Privado">Private Health Insurance</option>
      <option value="Dental or Vision" data-en="Dental or Vision" data-es="Dental o Visión">Dental or Vision</option>
      <option value="Not sure — need help deciding" data-en="Not sure — need help deciding" data-es="No estoy seguro — necesito ayuda">Not sure — need help deciding</option>
    </select>
  </div>

  <!-- Submit Button -->
  <button type="submit" id="form-submit-btn"
          style="background:#ff1090;color:white;padding:14px;border:none;border-radius:50px;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px;transition:all 0.2s;font-family:Arial,sans-serif;"
          onmouseover="this.style.background='#d4006d';this.style.transform='translateY(-2px)'"
          onmouseout="this.style.background='#ff1090';this.style.transform='translateY(0)'">
    <span data-en="Get Your Free Quote" data-es="Obtener Cotización Gratis">Get Your Free Quote</span>
  </button>

  <!-- Success Message -->
  <div id="form-success" style="display:none;text-align:center;padding:20px;background:#f0fdf4;border:2px solid #16a34a;border-radius:12px;margin-top:8px;">
    <div style="font-size:44px;margin-bottom:10px;"></div>
    <h3 style="color:#166534;margin:0 0 8px;font-size:20px;font-weight:700;" data-en="Thank you!" data-es="¡Gracias!">Thank you!</h3>
    <p style="color:#166534;margin:0 0 14px;font-size:15px;" data-en="We'll reach out today. Or call us now:" data-es="Te contactaremos hoy. O llama ahora:">We'll reach out today. Or call us now:</p>
    <a href="tel:18003806821" style="display:inline-block;background:#16a34a;color:white;font-weight:700;font-size:15px;padding:12px 26px;border-radius:50px;text-decoration:none;">1-800-380-6821</a>
  </div>

  <!-- Error Message -->
  <div id="form-error" style="display:none;text-align:center;padding:16px;background:#fef2f2;border:2px solid #ef4444;border-radius:12px;margin-top:8px;">
    <p style="color:#991b1b;margin:0;font-size:14px;" data-en="Something went wrong. Please call us at" data-es="Algo salió mal. Por favor llámanos al">Something went wrong. Please call us at</p>
    <a href="tel:18003806821" style="color:#991b1b;font-weight:700;">1-800-380-6821</a>
  </div>

</form>

<script>
// Auto-translate form based on URL path
(function() {
  const isSpanish = window.location.pathname.includes('/es/');
  if (isSpanish) {
    document.querySelectorAll('[data-es]').forEach(el => {
      if (el.tagName === 'OPTION') {
        el.textContent = el.getAttribute('data-es');
      } else {
        el.textContent = el.getAttribute('data-es');
      }
    });
  }
})();

// Form submission handler
document.getElementById('homepage-lead-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  
  const submitBtn = document.getElementById('form-submit-btn');
  const formContainer = document.getElementById('homepage-lead-form');
  const successMsg = document.getElementById('form-success');
  const errorMsg = document.getElementById('form-error');
  
  // Get form values
  const firstName = document.getElementById('form-first-name').value.trim();
  const lastName = document.getElementById('form-last-name').value.trim();
  const phone = document.getElementById('form-phone').value.trim();
  const email = document.getElementById('form-email').value.trim();
  const coverageType = document.getElementById('form-coverage-type').value;
  
  // Validate
  if (!firstName || !lastName || !phone || !email || !coverageType) {
    alert(window.location.pathname.includes('/es/') 
      ? 'Por favor completa todos los campos.' 
      : 'Please fill in all fields.');
    return;
  }
  
  // Disable button
  submitBtn.disabled = true;
  submitBtn.textContent = window.location.pathname.includes('/es/') ? 'Enviando...' : 'Sending...';
  
  // Build payload
  const payload = {
    first_name: firstName,
    last_name: lastName,
    email: email,
    phone: phone,
    coverage_type: coverageType,
    lang: window.location.pathname.includes('/es/') ? 'spanish' : 'english',
    source: 'Homepage Form',
    page: window.location.href,
    submitted_at: new Date().toISOString()
  };
  
  try {
    // POST to GHL webhook
    const response = await fetch('https://services.leadconnectorhq.com/hooks/RINM4TCnM4hN06UA1aK0/webhook-trigger/dc6c8b35-9480-412e-b56d-4a4c8c7bd438', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    
    if (!response.ok) {
      throw new Error('Webhook failed');
    }
    
    // Success - hide form, show success message
    formContainer.style.display = 'none';
    successMsg.style.display = 'block';
    
  } catch (error) {
    console.error('Form submission error:', error);
    errorMsg.style.display = 'block';
    submitBtn.disabled = false;
    submitBtn.textContent = window.location.pathname.includes('/es/') ? 'Obtener Cotización Gratis' : 'Get Your Free Quote';
  }
});
</script>
