[build]
  publish = "_site"
  command = "npm ci && npx @11ty/eleventy"

[build.environment]
  NODE_VERSION = "20"

# 301 redirect for renamed calculator
[[redirects]]
  from = "/medigap-calculator"
  to = "/medigap-plan-calculator"
  status = 301
  force = true

# 301 redirect for MSP (consolidate to real page)
[[redirects]]
  from = "/medicare/medicare-savings-program"
  to = "/medicare-savings-program"
  status = 301
  force = true

# 301 redirect for ACA (fix URL conflict - acaplans → aca-plans-miami)
[[redirects]]
  from = "/acaplans"
  to = "/aca-plans-miami"
  status = 301
  force = true

[[redirects]]
  from = "/health-insurance-broker"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
