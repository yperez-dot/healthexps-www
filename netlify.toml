[build]
  publish = "."
  command = "echo 'Static site - no build needed'"

# 301 redirect for renamed calculator
[[redirects]]
  from = "/medigap-calculator"
  to = "/medicare-advantage-vs-supplement-calculator"
  status = 301
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
